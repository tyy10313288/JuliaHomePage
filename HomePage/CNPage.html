<body>
    <div id="content">
        <h1 id="text1" style="display: block;">你好！我叫Julia！很高興認識你</h1>

        <h1 id="text3" style="display: none;">但是如果你能期待一下我之後的發展，我會很高興</h1>
        <h1 id="text4" style="display: none;">如你願意支持我的話，請留下你的電郵</h1>
        <h1 id="text5" style="display: none;">當我日後完成這網頁後，希望你能夠再次花時間來觀看我的網頁</h1>
        <h1 id="text6" style="display: none;">非常感謝你的時間</h1>
    </div>
    <input type="email" id="email" placeholder="輸入您的電郵地址" style="display: none;">
    <button id="subscribe" style="display: none;" onclick="subscribe()">訂閱</button>

    <script src="script.js"></script>
